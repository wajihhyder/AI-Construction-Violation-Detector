services:
  - type: web
    name: ai-powered-construction-violation-detection
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    disk:
      name: ai-powered-construction-data
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:////var/data/vioscan.db
      - key: GEOAPIFY_API_KEY
        sync: false
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: MAX_FILE_SIZE_MB
        value: "10"
      - key: AI_STREET_MODEL_PATH
        value: /app/best_floor.pt
      - key: AI_STREET_MODEL_CONFIDENCE
        value: "0.15"
      - key: AI_STREET_MODEL_IOU
        value: "0.3"
      - key: AI_DEVICE
        value: cpu
      - key: FRONTEND_URL
        sync: false
      - key: NOTICE_REPLY_DAYS
        value: "7"
